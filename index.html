<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DharmaYatra 101 — A Game. A Journey. A Mirror.</title>
  <meta name="description" content="Not every move is random. Some are reflections waiting to be noticed. DharmaYatra 101 is a reimagined Snakes & Ladders experience powered by AI wisdom. Every square carries meaning. Every move triggers reflection. The journey responds to you.">
  <meta property="og:title" content="DharmaYatra 101 — A Game. A Journey. A Mirror.">
  <meta property="og:description" content="This journey doesn't guide you. It reflects you.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Noto+Sans+Devanagari:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&family=Noto+Sans+Tamil:wght@400;700&family=Noto+Sans+Telugu:wght@400;700&family=Noto+Sans+Kannada:wght@400;700&family=Noto+Sans+Gujarati:wght@400;700&family=Noto+Sans+Gurmukhi:wght@400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      plugins: [
        require('tailwind-scrollbar'),
      ],
      variants: {
        scrollbar: ['rounded']
      }
    }
  </script>
  <style>
    body {
      font-family: 'Noto Sans', 'Noto Sans Devanagari', sans-serif; /* Default stack */
    }
    .font-noto-sans { font-family: 'Noto Sans', sans-serif; }
    .font-noto-devanagari { font-family: 'Noto Sans Devanagari', 'Noto Sans', sans-serif; }
    .font-noto-bengali { font-family: 'Noto Sans Bengali', 'Noto Sans', sans-serif; }
    .font-noto-tamil { font-family: 'Noto Sans Tamil', 'Noto Sans', sans-serif; }
    .font-noto-telugu { font-family: 'Noto Sans Telugu', 'Noto Sans', sans-serif; }
    .font-noto-kannada { font-family: 'Noto Sans Kannada', 'Noto Sans', sans-serif; }
    .font-noto-gujarati { font-family: 'Noto Sans Gujarati', 'Noto Sans', sans-serif; }
    .font-noto-gurmukhi { font-family: 'Noto Sans Gurmukhi', 'Noto Sans', sans-serif; }

    /* For better animal icon visibility on colored backgrounds */
    .animal-icon-on-peg {
        filter: drop-shadow(0 0 1px rgba(0,0,0,0.7));
    }

    /* Dice Bounce Animation (post-roll) */
    @keyframes bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.1); }
    }
    .animate-dice-bounce {
      animation: bounce 0.4s ease-in-out;
    }

    /* Player Peg Transition */
    .player-peg {
      transition: all 0.4s ease-in-out, transform 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }

    /* Dice Shake Animation (pre-roll) */
    .shake {
      animation: shake 0.6s;
    }
    @keyframes shake {
      0% { transform: rotate(0deg); }
      15% { transform: rotate(10deg); }
      30% { transform: rotate(-10deg); }
      45% { transform: rotate(8deg); }
      60% { transform: rotate(-8deg); }
      75% { transform: rotate(5deg); }
      90% { transform: rotate(-5deg); }
      100% { transform: rotate(0deg); }
    }
  </style>
<script type="importmap">
