<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DharmaYatra — Cinematic Trailer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            max-width: 1080px; /* Preserve 9:16 feel if needed, or fill square */
            aspect-ratio: 9/16;
        }
        #start-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fdf5e6;
            font-family: 'serif';
            cursor: pointer;
            transition: opacity 0.8s;
        }
        h1 { font-size: 3rem; margin-bottom: 1rem; text-align: center; }
        p { font-size: 1.2rem; opacity: 0.7; }
        .skip-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 200;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            display: none;
        }
    </style>
</head>
<body>

<div id="start-overlay" onclick="startVideo()">
    <h1>DharmaYatra 101</h1>
    <p>Click to Play Cinematic Trailer</p>
</div>

<button class="skip-btn" id="skip" onclick="window.location.href='index.html'">EXIT ⏭</button>

<video id="trailer" playsinline>
    <source src="assets/India%E2%80%99s%20First%20Reflective%20Game.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>

<script>
    const video = document.getElementById('trailer');
    const overlay = document.getElementById('start-overlay');
    const skipBtn = document.getElementById('skip');

    function startVideo() {
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
            skipBtn.style.display = 'block';
        }, 800);
        video.play();
    }

    video.onended = function() {
        window.location.href = 'index.html';
    };
</script>

</body>
</html>
